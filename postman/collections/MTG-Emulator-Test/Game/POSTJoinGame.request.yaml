$kind: http-request
name: POSTJoinGame
url: "{{baseURL}}/api/Game/join"
method: POST
body:
  type: json
  content: "{\r

    \    \"gameCode\": \"{{UserGame}}\",\r

    \    \"playerName\": \"{{Username2}}\"\r

    }"
scripts:
  - type: afterResponse
    code: "const baseURL = pm.environment.get('baseURL');\r

      const testEndpoint = baseURL + '/api/Game/join';\r

      const test2Endpoint = baseURL + '/api/Game/' + pm.environment.get('UserGame');\r

      const requestBody = pm.request.body.raw;\r

      \r

      function check(responseJson) {\r

      \    pm.expect(responseJson).to.have.property('Success');\r

      \    pm.expect(responseJson).to.have.property('GameCode');\r

      \    pm.expect(responseJson).to.have.property('MaxPlayers');\r

      \    pm.expect(responseJson).to.have.property('CurrentPlayers');\r

      \    pm.expect(responseJson).to.have.property('Message');\r

      \    pm.expect(responseJson.CurrentPlayers).to.equal(2);\r

      }\r

      \r

      // Admin\r

      pm.sendRequest({\r

      \    url: testEndpoint,\r

      \    method: 'POST',\r

      \    header: [\r

      \        { key: 'Content-Type', value: 'application/json' },\r

      \        { key: 'Authorization', value: 'Bearer ' + pm.environment.get('AdminToken')}\r

      \    ],\r

      \    body: { mode: 'raw', raw: requestBody }\r

      }, function(err, res) {\r

      \    if (err) { console.log('Admin error:', err); return; }\r

      \    pm.test(\"Admin cannot join game\", function(){\r

      \        pm.expect(res.code).to.equal(403);\r

      \    });\r

      \r

      \    // User (already in game)\r

      \    pm.sendRequest({\r

      \        url: testEndpoint,\r

      \        method: 'POST',\r

      \        header: [\r

      \            { key: 'Content-Type', value: 'application/json' },\r

      \            { key: 'Authorization', value: 'Bearer ' + pm.environment.get('UserToken')}\r

      \        ],\r

      \        body: { mode: 'raw', raw: requestBody }\r

      \    }, function(err, res) {\r

      \        if (err) { console.log('User error:', err); return; }\r

      \        pm.test(\"User already in game returns 409\", function(){\r

      \            pm.expect(res.code).to.equal(409);\r

      \        });\r

      \r

      \        // User2 joins\r

      \        pm.sendRequest({\r

      \            url: testEndpoint,\r

      \            method: 'POST',\r

      \            header: [\r

      \                { key: 'Content-Type', value: 'application/json' },\r

      \                { key: 'Authorization', value: 'Bearer ' + pm.environment.get('UserToken2')}\r

      \            ],\r

      \            body: { mode: 'raw', raw: requestBody }\r

      \        }, function(err, res) {\r

      \            if (err) { console.log('User2 error:', err); return; }\r

      \            pm.test(\"User2 can join game\", function(){\r

      \                pm.expect(res.code).to.equal(200);\r

      \            });\r

      \r

      \            // GET after User2 joins\r

      \            pm.sendRequest({\r

      \                url: test2Endpoint,\r

      \                method: 'GET',\r

      \                header: [\r

      \                    { key: 'Authorization', value: 'Bearer ' + pm.environment.get('UserToken')}\r

      \                ]\r

      \            }, function(err, res) {\r

      \                pm.test(\"UserToken GET is authorized\", function(){\r

      \                    pm.expect(res.code).to.equal(200);\r

      \                });\r

      \                pm.test(\"Game has 2 current players\", function(){\r

      \                    var responseJson = res.json();\r

      \                    check(responseJson);\r

      \                    console.log('Game state:', JSON.stringify(responseJson));\r

      \                });\r

      \            });\r

      \        });\r

      \    });\r

      });"
    language: text/javascript
order: 1848440400813010
