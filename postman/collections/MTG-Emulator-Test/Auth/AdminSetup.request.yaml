$kind: http-request
name: AdminSetup
url: "{{baseURL}}/api/Authentication/login"
method: POST
body:
  type: json
  content: "{\r

    \    \"email\": \"admin@mtg.com\",\r

    \    \"password\": \"Admin123!\"\r

    }"
scripts:
  - type: afterResponse
    code: "var responseJSON = pm.response.json();\r

      \r

      pm.test(\"Login returns 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response contains token\", function () {\r

      \    pm.expect(responseJSON.Token).to.be.a('string');\r

      \    pm.expect(responseJSON.Token).to.not.be.empty;\r

      });\r

      \r

      pm.test(\"Response time is acceptable\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(500);\r

      });\r

      \r

      pm.environment.set('OGAdminToken', responseJSON.Token);"
    language: text/javascript
  - type: beforeRequest
    code: "const baseURL = pm.environment.get('baseURL');\r

      const testEndpoint = baseURL + '/api/Authentication/login';\r

      \r

      pm.sendRequest({\r

      \    url: testEndpoint,\r

      \    method: 'POST',\r

      \    header: [\r

      \        { key: 'Content-Type', value: 'application/json' }\r

      \    ],\r

      \    body: {\r

      \        mode: 'raw',\r

      \        raw: '{\"email\":\"admin@mtg.com\",\"password\":\"Admin123!\"}'\r

      \    }\r

      }, function(err, res) {\r

      \    const token = res.json().Token;\r

      \    pm.environment.set('OGAdminToken', token);\r

      \    console.log('OGAdminToken set:', token);\r

      });"
    language: text/javascript
order: 292231540180
