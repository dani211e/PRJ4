$kind: http-request
name: PUTResetPassword
url: "{{baseURL}}/api/Authentication/reset-password"
method: PUT
body:
  type: json
  content: "{\r

    \    \"newPassword\": \"Test1234!\",\r

    \    \"confirmPassword\": \"Test1234!\"\r

    }"
scripts:
  - type: beforeRequest
    code: "const baseURL = pm.environment.get('baseURL');\r

      const testEndpoint = baseURL + '/api/Authentication/reset-password';\r

      \r

      //Admin\r

      pm.sendRequest({\r

      \    url: testEndpoint,\r

      \    method: 'PUT',\r

      \    header: [\r

      \        { key: 'Content-Type', value: 'application/json' },\r

      \        { key: 'Authorization', value: 'Bearer ' + pm.environment.get('AdminToken')}\r

      \    ],\r

      \    body: {\r

      \        mode: 'raw',\r

      \        raw: '{\"newPassword\": \"Test1234!\",\"confirmPassword\": \"Test1234!\"}'\r

      \    }\r

      },  function(err, res) {\r

      \    console.log('Admin register status:', res.status);\r

      \    console.log('Admin register body:', res.text());\r

      });\r

      \r

      // User \r

      \    pm.sendRequest({\r

      \        url: testEndpoint,\r

      \        method: 'PUT',\r

      \        header: [\r

      \        { key: 'Content-Type', value: 'application/json' },\r

      \        { key: 'Authorization', value: 'Bearer ' + pm.environment.get('UserToken')}\r

      \    ],\r

      \        body: {\r

      \            mode: 'raw',\r

      \            raw: '{\"newPassword\": \"Test1234!\",\"confirmPassword\": \"Test1234!\"}'\r

      \        }\r

      \    }, function(err, res) {\r

      \        console.log('User register status:', res.status);\r

      \        console.log('User register body:', res.text());   \r

      \        pm.test(\"User PUT is authorized\", function(){\r

      \        pm.expect(res.code).to.equal(204);\r

      \        });\r

      \    });"
    language: text/javascript
order: 3406290888992165
