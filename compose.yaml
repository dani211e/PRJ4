version: '3.9'

services:
  mtg-backend:
    build:
      context: .
      dockerfile: MTG-Emulator.Backend/Dockerfile
    container_name: mtg_game_api
    ports:
      - "5042:5042"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5042
      - ConnectionStrings__DefaultConnection=Server=mtg-sql;Database=MTGDB;User Id=sa;Password=${MTG_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__MongoConnection=mongodb://mtg-mongo:27017/MTGLogs
      - SCRYFALL_DATA_PATH=/data/scryfall-data
    depends_on:
      mtg-sql:
        condition: service_healthy
      mtg-mongo:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./scryfall-data:/data/scryfall-data

  mtg-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mtg_game_sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MTG_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MTG_PASSWORD}", "-Q", "SELECT 1", "-No" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mtg-mongo:
    image: mongo:7
    container_name: mtg_game_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sql_data:
  mongo_data:
