

services:
  mtg-backend:
    build:
      context: .
      dockerfile: MTG-Emulator.Backend/Dockerfile
    container_name: mtg_game_api
    ports:
      - "5042:5042"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5042
      - ConnectionStrings__DefaultConnection=Server=mtg-sql;Database=MTGDB;User Id=sa;Password=${MTG_PASSWORD:?};TrustServerCertificate=True;
      - ConnectionStrings__MongoConnection=mongodb://mtg-mongo:27017/MTGLogs
      - SCRYFALL_DATA_PATH=/data/scryfall-data
      - JWT__SigningKey=${JWT_SIGNING_KEY:?}
      - JWT__Issuer=${JWT_ISSUER:?}
      - JWT__Audience=${JWT_AUDIENCE:?}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:?}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?}
    depends_on:
      mtg-sql:
        condition: service_healthy
      mtg-mongo:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ${SCRYFALL_DATA_PATH:?}:/data/scryfall-data

  mtg-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mtg_game_sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MTG_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MTG_PASSWORD:?}", "-Q", 
              "IF EXISTS (SELECT 1 FROM sys.databases WHERE name='MTGDB' AND state_desc='ONLINE') SELECT 1 ELSE SELECT 1","-No" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mtg-mongo:
    image: mongo:7
    container_name: mtg_game_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sql_data:
  mongo_data:
